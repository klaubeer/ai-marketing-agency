services:
  ai-marketing-agency:
    build: .
    container_name: ai-marketing-agency
    restart: unless-stopped
    env_file:
      - .env.prod
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-marketing-agency.rule=Host(`mkto.klauberfischer.online`)"
      - "traefik.http.routers.ai-marketing-agency.entrypoints=websecure"
      - "traefik.http.routers.ai-marketing-agency.tls.certresolver=letsencrypt"
      - "traefik.http.services.ai-marketing-agency.loadbalancer.server.port=8501"

networks:
  proxy:
    external: true
