services:
  ai-marketing-agency:
    build: .
    container_name: ai-marketing-agency
    expose:
      - "8501"
    env_file:
      - .env.prod
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mkto.rule=Host(`mkto.klauberfischer.online`)"
      - "traefik.http.routers.mkto.entrypoints=websecure"
      - "traefik.http.routers.mkto.tls.certresolver=letsencrypt"
      - "traefik.http.services.mkto.loadbalancer.server.port=8501"
      - "traefik.docker.network=proxy"
    networks:
      - proxy

networks:
  proxy:
    external: true
